name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  _JAVA_OPTIONS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Djava.awt.headless=true"
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dorg.gradle.jvmargs=-Xmx4g -Djava.awt.headless=true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-disabled: true

    # अगर गिटहब सीक्रेट्स खाली है, तो यह एरर से बचाने के लिए एक टेम्परेरी स्ट्रिंग डाल देगा
    - name: Create .env file
      run: |
        if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
          echo "GEMINI_API_KEY=\"dummy_key_for_build_purposes\"" > .env
        else
          echo "GEMINI_API_KEY=\"${{ secrets.GEMINI_API_KEY }}\"" > .env
        fi

    - name: Generate Dummy Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore \
          -storepass android -alias androiddebugkey -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Build Debug APK
      run: |
        ./gradlew clean assembleDebug \
          --no-build-cache \
          --no-configuration-cache \
          --no-daemon \
          -Pkotlin.compiler.execution.strategy=in-process \
          -Pksp.incremental=false \
          -Pandroid.disableResourceValidation=true \
          -x lint
          
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
