name: Build Signed Android Release APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  _JAVA_OPTIONS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Djava.awt.headless=true"
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dorg.gradle.jvmargs=-Xmx4g -Djava.awt.headless=true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-disabled: true

    - name: Create .env file
      run: |
        if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
          echo "GEMINI_API_KEY=\"dummy_key_for_build_purposes\"" > .env
        else
          echo "GEMINI_API_KEY=\"${{ secrets.GEMINI_API_KEY }}\"" > .env
        fi

    # 🔑 गिटहब सीक्रेट्स का इस्तेमाल करके ऑटोमैटिक डिजिटल चाबी (Keystore) बनाना
    - name: Generate Release Keystore File
      run: |
        keytool -genkey -v -keystore keystore.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -alias "${{ secrets.KEY_ALIAS }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Takano3D,O=Takano3D,C=IN"

    # 🚀 असली Release APK बिल्ड करना (ग्रैडल वेरिएबल्स के साथ)
    - name: Build Signed Release APK
      env:
        KEYSTORE_PATH: "keystore.jks"
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ./gradlew clean assembleRelease \
          --no-build-cache \
          --no-configuration-cache \
          --no-daemon \
          -Pkotlin.compiler.execution.strategy=in-process \
          -Pksp.incremental=false \
          -Pandroid.disableResourceValidation=true \
          -x lint
          
    # 📦 बने हुए साइन्ड APK को गिटहब पर डाउनलोड के लिए अपलोड करना
    - name: Upload Signed Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Study-Controller-Signed-Release-APK
        path: app/build/outputs/apk/release/app-release.apk
